<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Todo app</title>
  </head>
  <body>
    <h1>Todo app</h1>
    <div class="container">
      <input
        type="text"
        id="todo-input"
        placeholder="Enter a new todo"
        required
      />
      <button type="button" id="add-button">Add Todo</button>
    </div>
    <div class="container">
      <ul id="todo-list"></ul>
    </div>

    <div class="container">
      <h3>Next class</h3>
      <p>Setup react alternative</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
